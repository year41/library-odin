<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Very Real Library!</h1>
        </header>

        <main class="card-container">
        </main>

        <div class="menu">
            <button class="btn" command="show-modal" commandfor="my-dialog">Add New Book</button>
        </div>

        <!-- <dialog id="my-dialog"> -->
            <h2 class="form title">Add a new Book!</h2>
            <form method="dialog">
                <!-- <form class="new-book" action="https://httpbin.org/post" method="post"> -->
                <div class="form-row">
                    <label for="title">Title</label>
                    <input type="text" name="title" id="title" placeholder="Book title..." required>
                </div>
                <div class="form-row">
                    <label for="author">Author</label>
                    <input type="text" name="author" id="author" placeholder="Author name..." required>
                </div>
                <div class="form-row">
                    <label for="pages">Pages</label>
                    <input 
                        type="text" 
                        name="pages" 
                        id="pages" 
                        pattern="[0-9]*" 
                        title="Please enter a valid number."
                        placeholder="Number of pages..."
                        required>
                    </div>
                <div class="form-btn">
                    <input class="btn" type="submit" value="Submit">
                </div>
            </form>
            <!-- <button commandfor="my-dialog" command="close">Close</button> -->
        </dialog>
    </div>
</body>

</html>
