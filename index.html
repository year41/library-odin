<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Very Real Library!</h1>
        </header>

        <main class="card-container">
        </main>

        <div class="menu">
            <button class="btn" command="show-modal" commandfor="my-dialog">Add New Book</button>
        </div>

        <dialog id="my-dialog">
            <h2 class="form title">Add a new Book!</h2>
            <form id="new-book-form" method="dialog">
                <div class="form-row">
                    <label for="title">Title</label>
                    <input type="text" name="title" id="title" placeholder="Book title..." required>
                </div>
                <div class="form-row">
                    <label for="author">Author</label>
                    <input type="text" name="author" id="author" placeholder="Author name..." required>
                </div>
                <div class="form-row">
                    <label for="pages">Pages</label>
                    <input type="text" name="pages" id="pages" pattern="[0-9]*" title="Please enter a valid number."
                        placeholder="Number of pages..." required>
                </div>
            </form>

            <div class="form-btns">
                <input class="btn" form="new-book-form" type="submit" value="Submit">
                <button class="btn" commandfor="my-dialog" command="close" type="reset">Cancel</button>
            </div>
        </dialog>
    </div>
</body>

</html>
